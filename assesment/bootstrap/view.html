<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Submissions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #C9D6FF, #E2E2E2);
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      color: #333;
    }
    table {
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h2>Guest Submissions List</h2>

  <div class="container">
    <table class="table table-bordered table-striped text-center">
      <thead class="table-dark">
        <tr>
          <th>Full Name</th>
          <th>Phone Number</th>
          <th>Email Address</th>
          <th>Aadhar Card Number</th>
          <th>Check-In Date</th>
          <th>Check-Out Date</th>
          <th>Purpose</th>
        </tr>
      </thead>
      <tbody id="submissionTable">
        <!-- Data will appear here -->
      </tbody>
    </table>

    <div class="text-center mt-4">
      <a href="swan-solution.html" class="btn btn-primary">Back to Form</a>
    </div>
  </div>

  <script>
    // Get saved data from localStorage
    const submissions = JSON.parse(localStorage.getItem("submissions")) || [];

    const tableBody = document.getElementById("submissionTable");

    if (submissions.length === 0) 
    {
      tableBody.innerHTML = `<tr><td colspan="7">No submissions found.</td></tr>`;
    } 
    else 
    {
      submissions.forEach((data) => {
        const row = `
          <tr>
            <td>${data.name}</td>
            <td>${data.phone}</td>
            <td>${data.email}</td>
            <td>${data.aadhar}</td>
            <td>${data.checkin}</td>
            <td>${data.checkout}</td>
            <td>${data.purpose}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    }
  </script>

</body>
</html>
