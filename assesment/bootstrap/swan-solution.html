<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body{
            background: linear-gradient(135deg, #74ABE2, #5563DE);
        }
        h2{
            margin-top: 20px;
            margin-left: 35%;
            font-weight: 700;
            color: rgb(52, 44, 44);   
        }
        form{
            margin-top: 50px;
        }
        #b1{
            margin-left: 40%;
        }
        #b2{
            margin-left: 5%;
        }
        label{
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div>
        <h2> Swan Solution Pvt. Ltd. </h2>
    </div>
    <form action="" id="guestForm">
    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Full Name :</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="name" placeholder="Enter Full Name :" required>
        </div>
    </div>

    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Phone Number :</label>
        <div class="col-sm-10">
            <input type="tel" class="form-control" id="phone" placeholder="Enter Phone Number :" pattern="[0-9]{10}" required>
        </div>
    </div>

    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Email :</label>
        <div class="col-sm-10">
            <input type="email" class="form-control" id="email" placeholder="Example09@gmail.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"  required>
        </div>
    </div>

    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Aadhar card Number :</label>
        <div class="col-sm-10">
            <input type="number" class="form-control" id="aadhar" placeholder="Enter Aadhar Card Number "  pattern="[0-9]{12}" required>
        </div>
    </div>

    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Check-in Date :</label>
        <div class="col-sm-10">
            <input type="date" class="form-control" id="checkin" placeholder="Enter check in date " required>
        </div>
    </div>

    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Check-Out Date :</label>
        <div class="col-sm-10">
            <input type="date" class="form-control" id="checkout" placeholder="Enter check out date " required>
        </div>
    </div>

    <div class="mb-3 row">
        <label for="" class="col-sm-2 col-form-label">Purpose of visit :</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="purpose" required>
        </div>
    </div>

    <button type="submit" class="btn btn-success" id="b1">Submit</button>
    <button type="reset" class="btn btn-danger" id="b2">Reset</button>
    </form>

    <script>
        document.getElementById('guestForm').addEventListener('submit', function(e) {
        e.preventDefault(); // stop default page reload

      // ✅ Collect form data
      const formData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        aadhar: document.getElementById('aadhar').value,
        checkin: document.getElementById('checkin').value,
        checkout: document.getElementById('checkout').value,
        purpose: document.getElementById('purpose').value
      };

      // ✅ Get existing submissions from localStorage
      let submissions = JSON.parse(localStorage.getItem('submissions')) || [];

      // ✅ Add new form data to list
      submissions.push(formData);

      // ✅ Store updated list back in localStorage
      localStorage.setItem('submissions', JSON.stringify(submissions));

      alert('✅ Form submitted successfully and saved to localStorage!');
      this.reset();
    });

  </script>

</body>
</html>
