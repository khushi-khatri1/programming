<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            height: 500px;
            width: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="main">
        <img src="/img/1.jpg" alt="" height="100%" width="100%" class="image">
        <img src="/img/2.jpg" alt="" height="100%" width="100%" class="image">
        <img src="/img/3.jpg" alt="" height="100%" width="100%" class="image">
        <img src="/img/4.jpg" alt="" height="100%" width="100%" class="image">
    </div>
    

    <script>
        let img_tag = document.getElementsByClassName("image")
        console.log(img_tag)
        index = 0

        function slider()
        {
            for(let i=0;i<img_tag.length;i++)
            {
                console.log(img_tag[i])
                img_tag[i].style.display="none"
            }
            img_tag[index].style.display="block"
            index++;

            if(index == 4)
            {
                index=0
            }
            setTimeout("slider()",2000)
        }
        slider()
    </script>
</body>
</html>
